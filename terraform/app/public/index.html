<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Assistente TDC Floripa</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 720px;
    margin: 0 auto;
    padding: 1.5rem;
    background: Canvas;
    color: CanvasText;
  }
  h1 { font-size: 1.3rem; margin-bottom: 0.2rem; }
  p.subtitle { opacity: 0.7; margin-top: 0; margin-bottom: 1.5rem; }
  #log {
    display: flex;
    flex-direction: column;
    gap: 0.9rem;
    margin-bottom: 1rem;
    min-height: 200px;
  }
  .turn { display: flex; flex-direction: column; max-width: 85%; }
  .turn.user { align-self: flex-end; align-items: flex-end; }
  .turn.bot { align-self: flex-start; align-items: flex-start; }
  .turn.error { align-self: flex-start; align-items: flex-start; }
  .label { font-size: 0.72rem; opacity: 0.55; margin-bottom: 0.15rem; padding: 0 0.2rem; }
  .msg { padding: 0.6rem 0.9rem; border-radius: 0.9rem; line-height: 1.45; }
  .msg p { margin: 0 0 0.5rem; }
  .msg p:last-child { margin-bottom: 0; }
  .msg ul { margin: 0.2rem 0 0.5rem; padding-left: 1.2rem; }
  .msg ul:last-child { margin-bottom: 0; }
  .turn.user .msg { background: #2563eb; color: white; border-bottom-right-radius: 0.2rem; }
  .turn.bot .msg { background: rgba(127,127,127,0.15); border-bottom-left-radius: 0.2rem; }
  .turn.error .msg { background: #dc2626; color: white; border-bottom-left-radius: 0.2rem; }
  .typing .msg { display: flex; gap: 0.25rem; align-items: center; }
  .typing .dot {
    width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.5;
    animation: blink 1.2s infinite ease-in-out;
  }
  .typing .dot:nth-child(2) { animation-delay: 0.2s; }
  .typing .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); } 40% { opacity: 1; transform: scale(1); } }
  form { display: flex; gap: 0.5rem; }
  input[type=text] {
    flex: 1;
    padding: 0.6rem 0.8rem;
    border-radius: 0.5rem;
    border: 1px solid rgba(127,127,127,0.4);
    font-size: 1rem;
    background: Field;
    color: FieldText;
  }
  button {
    padding: 0.6rem 1rem;
    border-radius: 0.5rem;
    border: none;
    background: #2563eb;
    color: white;
    font-size: 1rem;
    cursor: pointer;
  }
  button:disabled { opacity: 0.6; cursor: default; }
</style>
</head>
<body>
  <h1>Assistente TDC Floripa</h1>
  <p class="subtitle">RAG + Custom Tool sobre OCI Generative AI, rodando nesta VM.</p>
  <div id="log"></div>
  <form id="chat-form">
    <input id="message" type="text" placeholder="Pergunte sobre o TDC Floripa 2026..." autocomplete="off" autofocus />
    <button type="submit" id="send-btn">Enviar</button>
  </form>

  <script>
    const log = document.getElementById('log');
    const form = document.getElementById('chat-form');
    const input = document.getElementById('message');
    const sendBtn = document.getElementById('send-btn');

    // Historico enviado a cada request, para o assistente lembrar do
    // contexto da conversa (ex: "que dia" apos perguntar sobre um speaker).
    const history = [];

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // Renderizacao bem simples: **negrito**, listas com "- " ou "* ", e
    // paragrafos separados por linha em branco. Suficiente para as respostas
    // do assistente, sem precisar de uma lib de markdown inteira.
    function renderMessageHtml(rawText) {
      const escaped = escapeHtml(rawText).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      const blocks = escaped.split(/\n{2,}/);
      return blocks.map((block) => {
        const lines = block.split('\n').filter((l) => l.trim().length > 0);
        const isList = lines.length > 0 && lines.every((l) => /^\s*[-*]\s+/.test(l));
        if (isList) {
          const items = lines.map((l) => '<li>' + l.replace(/^\s*[-*]\s+/, '') + '</li>').join('');
          return '<ul>' + items + '</ul>';
        }
        return '<p>' + lines.join('<br>') + '</p>';
      }).join('');
    }

    function addTurn(text, cls, { asHtml } = {}) {
      const turn = document.createElement('div');
      turn.className = 'turn ' + cls;

      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = cls === 'user' ? 'Você' : cls === 'error' ? 'Erro' : 'Assistente TDC Floripa';
      turn.appendChild(label);

      const msg = document.createElement('div');
      msg.className = 'msg';
      if (asHtml) {
        msg.innerHTML = renderMessageHtml(text);
      } else {
        msg.textContent = text;
      }
      turn.appendChild(msg);

      log.appendChild(turn);
      window.scrollTo(0, document.body.scrollHeight);
      return turn;
    }

    function addTypingIndicator() {
      const turn = document.createElement('div');
      turn.className = 'turn bot typing';
      turn.innerHTML = '<div class="label">Assistente TDC Floripa</div>' +
        '<div class="msg"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
      log.appendChild(turn);
      window.scrollTo(0, document.body.scrollHeight);
      return turn;
    }

    form.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const message = input.value.trim();
      if (!message) return;

      addTurn(message, 'user');
      input.value = '';
      sendBtn.disabled = true;
      const typingTurn = addTypingIndicator();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, history })
        });
        const data = await res.json();
        typingTurn.remove();

        if (!res.ok) {
          addTurn('Erro: ' + (data.error || res.statusText), 'error');
        } else {
          const reply = data.text || '(resposta vazia)';
          addTurn(reply, 'bot', { asHtml: true });
          history.push({ role: 'user', text: message });
          history.push({ role: 'assistant', text: reply });
        }
      } catch (err) {
        typingTurn.remove();
        addTurn('Erro de rede: ' + err.message, 'error');
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
